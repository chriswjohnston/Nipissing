<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resolution — Nipissing Township Public Records</title>
<link rel="stylesheet" href="shared.css">

<style>
.detail-wrap{
  display:grid;
  grid-template-columns:minmax(0,1fr) 320px;
  gap:2rem;
  max-width:1240px;
  margin:2rem auto;
  padding:0 2rem;
}
.page-header{
  background:#1f5682;
  color:#fff;
  padding:36px 0 32px;
}

.container{
  width:min(1100px, calc(100% - 32px));
  margin:0 auto;
}

.back-link{
  display:inline-block;
  margin-bottom:14px;
  color:rgba(255,255,255,0.9);
  text-decoration:none;
  font-size:14px;
}

.back-link:hover{
  text-decoration:underline;
}

.header-meta{
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.85;
  margin-bottom:6px;
}

.header-title{
  font-size:36px;
  margin:0 0 8px;
}

.header-subtitle{
  font-size:18px;
  opacity:.95;
  margin-bottom:14px;
}

.header-actions a{
  display:inline-block;
  margin-right:10px;
  padding:8px 12px;
  border:1px solid rgba(255,255,255,0.5);
  border-radius:8px;
  color:#fff;
  text-decoration:none;
}

.header-actions a:hover{
  background:rgba(255,255,255,0.1);
}
@media(max-width:900px){
  .detail-wrap{grid-template-columns:1fr}
}

.detail-card{
  background:var(--white);
  border:1px solid var(--rule);
  border-radius:14px;
  padding:1.5rem;
}

.detail-title{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:.9rem;
}

.resolution-header{
  display:flex;
  align-items:flex-start;
  gap:1rem;
}

.resolution-icon{
  width:48px;
  height:48px;
  border-radius:10px;
  background:var(--teal-lt);
  color:var(--teal);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.resolution-icon svg{
  width:22px;
  height:22px;
}

.resolution-meta{
  min-width:0;
}

.resolution-number{
  font-size:.74rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--teal);
  margin-bottom:.35rem;
}

.resolution-name{
  font-family:var(--font-display, Georgia, serif);
  font-size:1.65rem;
  line-height:1.25;
  color:var(--ink);
  margin:0 0 .55rem 0;
}

.resolution-subtitle{
  color:var(--ink-3);
  font-size:.98rem;
  line-height:1.6;
  margin-bottom:.9rem;
}

.meta-pills{
  display:flex;
  flex-wrap:wrap;
  gap:.45rem;
}

.meta-pill{
  display:inline-flex;
  align-items:center;
  padding:.25rem .55rem;
  border-radius:8px;
  border:1px solid var(--rule);
  background:var(--page);
  font-size:.78rem;
  color:var(--ink-3);
}

.status-pill{
  font-weight:600;
}

.status-carried{
  background:#e8f5ea;
  border-color:#cde7d3;
  color:#22743d;
}

.status-defeated{
  background:#fdeaea;
  border-color:#efc8c8;
  color:#b42318;
}

.status-unknown{
  background:#fff6e2;
  border-color:#ecdca9;
  color:#9a6d00;
}

.content-block{
  margin-top:1.25rem;
}

.content-block h3{
  font-size:.82rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin:0 0 .65rem 0;
}

.content-block p{
  margin:.55rem 0;
  line-height:1.7;
  color:var(--ink);
}

.side-card{
  background:var(--white);
  border:1px solid var(--rule);
  border-radius:14px;
  padding:1.2rem;
  margin-bottom:1rem;
}

.side-title{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:.9rem;
}

.meta-row{
  margin-bottom:.9rem;
  padding-bottom:.9rem;
  border-bottom:1px solid var(--rule);
}

.meta-row:last-child{
  margin-bottom:0;
  padding-bottom:0;
  border-bottom:none;
}

.meta-label{
  font-size:.68rem;
  text-transform:uppercase;
  color:var(--ink-4);
  letter-spacing:.05em;
  margin-bottom:.25rem;
}

.meta-value{
  font-size:.95rem;
  font-weight:600;
  color:var(--ink);
}

.docs-stack{
  display:flex;
  flex-direction:column;
  gap:.5rem;
}

.doc-link{
  display:flex;
  align-items:center;
  gap:.6rem;
  padding:.7rem .8rem;
  border:1px solid var(--rule);
  border-radius:10px;
  text-decoration:none;
  color:var(--ink);
  font-size:.88rem;
  font-weight:500;
  background:var(--white);
  transition:.15s;
}

.doc-link:hover{
  background:var(--blue-lt);
  border-color:var(--blue);
}

.doc-link svg{
  width:16px;
  height:16px;
  flex-shrink:0;
}

.empty-note{
  color:var(--ink-4);
  font-size:.9rem;
  font-style:italic;
}
  .bylaw-page-header{
  background:#1f5682;
  color:#fff;
  padding:32px 0 40px;
  border-bottom:3px solid #c69214;
}

.bylaw-page-header .header-inner{
  max-width:1240px;
  margin:0 auto;
  padding:0 2rem;
}

.bylaw-page-header .back-link{
  display:inline-block;
  margin-bottom:12px;
  color:rgba(255,255,255,0.92);
  text-decoration:none;
  font-size:14px;
  font-weight:600;
}

.bylaw-page-header .back-link:hover{
  text-decoration:underline;
}

.bylaw-page-header .header-meta{
  display:flex;
  align-items:center;
  gap:.5rem;
  flex-wrap:wrap;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.88);
  margin-bottom:8px;
  opacity:1;
}

.bylaw-page-header .header-title{
  font-size:36px;
  line-height:1.1;
  margin:0 0 8px;
  color:#fff;
  font-weight:700;
}

.bylaw-page-header .header-subtitle{
  font-size:18px;
  line-height:1.5;
  color:rgba(255,255,255,0.95);
  margin-bottom:16px;
  max-width:920px;
  opacity:1;
}

.bylaw-page-header .header-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.bylaw-page-header .header-actions a{
  display:inline-flex;
  align-items:center;
  padding:10px 14px;
  border:1px solid rgba(255,255,255,0.45);
  border-radius:10px;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,0.06);
  font-weight:500;
}

.bylaw-page-header .header-actions a:hover{

</style>
</head>

<section class="resolution-page-header">
  <div class="header-inner">

  </div>

<main class="detail-wrap">

  <div>
    <div class="detail-card">
      <div class="detail-title">Resolution</div>

      <div class="resolution-header">
        <div class="resolution-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>

          </svg>
        </div>

        <div class="resolution-meta">
          <div class="resolution-number" id="resolution-number"></div>

          <div class="resolution-subtitle" id="resolution-subtitle"></div>

      </div>

      <div class="content-block">

  <div>
    <div class="side-card">
      <div class="side-title">Details</div>

        <div class="meta-label">Number</div>
        <div class="meta-value" id="meta-number"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Meeting Date</div>
        <div class="meta-value" id="meta-meeting-date"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Mover</div>
        <div class="meta-value" id="meta-mover"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Seconder</div>
        <div class="meta-value" id="meta-seconder"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Status</div>
        <div class="meta-value" id="meta-status"></div>
      </div>
    </div>

</main>

<script src="shared.js"></script>
<script>
function getParam(name){
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

function esc(str){
  return (str || '').replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}

function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(`${iso}T00:00:00`);
  if(Number.isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-CA', {month:'short', day:'numeric', year:'numeric'});
}

function iconDoc(){
  return `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
  `;
}

function iconCalendar(){
  return `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
      <line x1="16" x2="16" y1="2" y2="6"/>
      <line x1="8" x2="8" y1="2" y2="6"/>
      <line x1="3" x2="21" y1="10" y2="10"/>
    </svg>
  `;
}

function docLink(label, href, icon = 'doc'){
  const glyph = icon === 'calendar' ? iconCalendar() : iconDoc();
  return `<a href="${esc(href)}" target="${icon === 'calendar' ? '_self' : '_blank'}" rel="noopener" class="doc-link">${glyph}<span>${esc(label)}</span></a>`;
}

async function init(){
  await loadAllData();

  const id = (getParam('id') || getParam('number') || '').toUpperCase();
  const resolution = RESOLUTIONS.find(r => String(r.number || '').toUpperCase() === id);

  if(!resolution){
    document.body.innerHTML = '<p style="padding:2rem">Resolution not found</p>';
    return;
  }

  document.title = `${resolution.number} — Nipissing Township Public Records`;

  document.getElementById('resolution-number').textContent = resolution.number || 'Resolution';
  document.getElementById('resolution-title').textContent = resolution.title || resolution.number || 'Resolution';
  document.getElementById('resolution-subtitle').textContent = resolution.category || '';

  document.getElementById('motion-text').textContent = resolution.motion_text || '—';

  document.getElementById('meta-number').textContent = resolution.number || '—';
  document.getElementById('meta-meeting-date').textContent = fmtDate(resolution.meeting_date);
  document.getElementById('meta-mover').textContent = resolution.mover || '—';
  document.getElementById('meta-seconder').textContent = resolution.seconder || '—';
  document.getElementById('meta-status').textContent = resolution.status || '—';

  const statusClass =
    resolution.status === 'carried' ? 'status-carried' :
    resolution.status === 'defeated' ? 'status-defeated' :
    'status-unknown';

  const pills = [];
  pills.push(`<span class="meta-pill status-pill ${statusClass}">${esc(resolution.status || 'unknown')}</span>`);
  if(resolution.category) pills.push(`<span class="meta-pill">${esc(resolution.category)}</span>`);
  if(resolution.bylaw_number) pills.push(`<span class="meta-pill">By-Law ${esc(resolution.bylaw_number)}</span>`);
  document.getElementById('resolution-pills').innerHTML = pills.join('');

  const links = [];
  if(resolution.pdf_url) links.push(docLink('Resolution PDF', resolution.pdf_url));
  if(resolution.minutes_url) links.push(docLink('Minutes', resolution.minutes_url));
  if(resolution.agenda_package_url) links.push(docLink('Agenda Package', resolution.agenda_package_url));
  if(resolution.meeting_date){
    links.push(docLink(
      'Related Meeting',
      `meeting-detail.html?date=${encodeURIComponent(resolution.meeting_date)}&body=council`,
      'calendar'
    ));
  }
  if(resolution.bylaw_number){
    links.push(docLink(
      `Related By-Law ${resolution.bylaw_number}`,
      `bylaw-detail.html?id=${encodeURIComponent(resolution.bylaw_number)}`,
      'calendar'
    ));
  }

  document.getElementById('doc-links').innerHTML =
    links.length ? links.join('') : '<p class="empty-note">No related documents available.</p>';
}

init();
</script>
</body>
