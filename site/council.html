<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meetings — Nipissing Township Public Records</title>

<link rel="stylesheet" href="shared.css">

<style>
.header-split{
  display:grid;
  grid-template-columns:minmax(340px,1.1fr) minmax(320px,.9fr);
  gap:2rem;
  align-items:start;
}

.header-upcoming{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  padding:1rem;
}

.upcoming-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:.8rem;
}

.upcoming-title{
  font-family:serif;
  font-size:1.2rem;
  font-weight:700;
  color:#fff;
}

.calendar-arrow{
  width:36px;
  height:36px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  color:#fff;
  cursor:pointer;
}

.upcoming-list{
  display:flex;
  flex-direction:column;
  gap:.5rem;
}

.upcoming-item{
  display:grid;
  grid-template-columns:60px 180px auto;
  align-items:center;
  gap:.6rem;
  padding:.55rem .65rem;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  border-radius:10px;
}

.upcoming-date{
  font-weight:700;
  color:#fff;
  text-align:center;
}

.upcoming-label{
  display:flex;
  align-items:center;
}

.month-badge{
  padding:.15rem .5rem;
  border-radius:999px;
  font-size:.65rem;
  font-weight:700;
  text-transform:uppercase;
}

.mb-council{background:#f5e7c3;color:#a97900}
.mb-recreation{background:#d9f3f0;color:#117a72}
.mb-museum{background:#dbe9ff;color:#1c4fd7}
.mb-cemetery{background:#efe7fb;color:#6840b5}

.upcoming-links{
  display:flex;
  gap:.3rem;
}

.upcoming-link{
  min-width:70px;
  text-align:center;
  padding:.2rem .5rem;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  color:#fff;
  font-size:.68rem;
  text-decoration:none;
  background:rgba(255,255,255,.07);
}

.upcoming-link:hover{
  background:rgba(255,255,255,.15);
}

@media(max-width:700px){
  .upcoming-item{
    grid-template-columns:50px 1fr;
  }

  .upcoming-links{
    grid-column:1 / -1;
  }
}
</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">Nipissing Township</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="bylaws.html">By-Laws & Resolutions</a></li>
      <li><a href="council.html" class="active">Meetings</a></li>
    </ul>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner header-split">

    <div>
      <h1>Meetings Archive</h1>
      <p>Council, board, and committee meetings — agendas, minutes, and packages.</p>
    </div>

    <div class="header-upcoming">
      <div class="upcoming-top">
        <button class="calendar-arrow" id="cal-prev">‹</button>
        <div class="upcoming-title" id="calendar-title"></div>
        <button class="calendar-arrow" id="cal-next">›</button>
      </div>

      <div class="upcoming-list" id="upcoming-list"></div>
    </div>

  </div>
</div>

<script src="shared.js"></script>

<script>
let calendarYear = new Date().getFullYear();
let calendarMonth = new Date().getMonth();

function bodyBadgeClass(bodyId){
  if(bodyId === 'council') return 'mb-council';
  if(bodyId === 'recreation') return 'mb-recreation';
  if(bodyId === 'museum') return 'mb-museum';
  if(bodyId === 'cemetery') return 'mb-cemetery';
  return 'mb-council';
}

function meetingsForMonth(year, month){
  return ALL_MEETINGS.filter(m=>{
    if(!m.date) return false;
    const d = new Date(m.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });
}

function renderUpcomingList(){
  const title = document.getElementById('calendar-title');
  const list = document.getElementById('upcoming-list');

  const first = new Date(calendarYear, calendarMonth, 1);
  title.textContent = first.toLocaleDateString('en-CA',{month:'long',year:'numeric'});

  const meetings = meetingsForMonth(calendarYear, calendarMonth);

  list.innerHTML = meetings.map(m=>{
    const day = String(new Date(m.date).getDate()).padStart(2,'0');

    return `
      <div class="upcoming-item">
        <div class="upcoming-date">${day}</div>

        <div class="upcoming-label">
          <span class="month-badge ${bodyBadgeClass(m.body_id)}">
            ${m.body || 'Meeting'}
          </span>
        </div>

        <div class="upcoming-links">
          ${m.agenda_url ? `<a href="${m.agenda_url}" class="upcoming-link" target="_blank">Agenda</a>`:''}
          ${m.minutes_url ? `<a href="${m.minutes_url}" class="upcoming-link" target="_blank">Minutes</a>`:''}
          ${m.package_url ? `<a href="${m.package_url}" class="upcoming-link" target="_blank">Package</a>`:''}
        </div>
      </div>
    `;
  }).join('');
}

document.getElementById('cal-prev').onclick = ()=>{
  calendarMonth--;
  if(calendarMonth < 0){
    calendarMonth = 11;
    calendarYear--;
  }
  renderUpcomingList();
};

document.getElementById('cal-next').onclick = ()=>{
  calendarMonth++;
  if(calendarMonth > 11){
    calendarMonth = 0;
    calendarYear++;
  }
  renderUpcomingList();
};

async function init(){
  await loadAllData();
  renderUpcomingList();
}

init();
</script>

</body>
</html>
