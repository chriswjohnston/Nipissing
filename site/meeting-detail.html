<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meeting — Nipissing Township Public Records</title>

<link rel="stylesheet" href="shared.css">

<style>
.detail-wrap{
  display:grid;
  grid-template-columns:minmax(0,1fr) 320px;
  gap:2rem;
  max-width:1240px;
  margin:2rem auto;
  padding:0 2rem;
}

@media(max-width:900px){
  .detail-wrap{grid-template-columns:1fr}
}

.summary-card{
  background:var(--white);
  border:1px solid var(--rule);
  border-radius:14px;
  padding:1.5rem;
}

.summary-title{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:.75rem;
}

.summary-body{
  font-size:.95rem;
  line-height:1.6;
}

.side-card{
  background:var(--white);
  border:1px solid var(--rule);
  border-radius:14px;
  padding:1.2rem;
  margin-bottom:1rem;
}

.side-title{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:.75rem;
}

.meta-row{
  margin-bottom:.7rem;
}

.meta-label{
  font-size:.68rem;
  text-transform:uppercase;
  color:var(--ink-4);
  letter-spacing:.05em;
}

.meta-value{
  font-size:.9rem;
  font-weight:600;
}

/* unified doc sections */
.docs-section{
  margin-top:1rem;
  padding-top:1rem;
  border-top:1px solid var(--rule);
}

.docs-section-title{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:.6rem;
}

.docs-stack{
  display:flex;
  flex-direction:column;
  gap:.5rem;
}

.doc-link{
  display:flex;
  align-items:center;
  gap:.6rem;
  padding:.6rem .7rem;
  border:1px solid var(--rule);
  border-radius:10px;
  text-decoration:none;
  color:var(--ink);
  font-size:.85rem;
  font-weight:500;
  background:var(--white);
  transition:.15s;
}

.doc-link:hover{
  background:var(--blue-lt);
  border-color:var(--blue);
}

.doc-link svg{
  width:16px;
  height:16px;
  flex-shrink:0;
}
</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">
      <div class="nav-brand-text">Nipissing Township <span>Public Records</span></div>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="bylaws.html">By-Laws & Resolutions</a></li>
      <li><a href="council.html">Meetings</a></li>
    </ul>
  </div>
</nav>

<main class="detail-wrap">

  <!-- LEFT -->
  <div>

    <div class="summary-card">
      <div class="summary-title">Summary</div>
      <div class="summary-body" id="summary-content"></div>
    </div>

  </div>

  <!-- RIGHT -->
  <div>

    <!-- DETAILS -->
    <div class="side-card">
      <div class="side-title">Meeting Details</div>

      <div class="meta-row">
        <div class="meta-label">Date</div>
        <div class="meta-value" id="meta-date"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Type</div>
        <div class="meta-value" id="meta-type"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Year</div>
        <div class="meta-value" id="meta-year"></div>
      </div>
    </div>

    <!-- DOCUMENTS -->
    <div class="side-card">
      <div class="side-title">Documents & Links</div>

      <div class="docs-stack" id="main-docs"></div>

      <div id="extra-docs-wrap"></div>
    </div>

  </div>

</main>

<script src="shared.js"></script>

<script>
function getParam(name){
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

function esc(str){
  return (str || '').replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
  }[m]));
}

function icon(){
  return `
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
  </svg>`;
}

function buildDoc(label, url){
  return `<a href="${esc(url)}" target="_blank" class="doc-link">${icon()}<span>${esc(label)}</span></a>`;
}

async function init(){
  await loadAllData();

  const date = getParam('date');
  const meeting = ALL_MEETINGS.find(m => m.date === date);

  if(!meeting){
    document.body.innerHTML = '<p style="padding:2rem">Meeting not found</p>';
    return;
  }

  // summary
  document.getElementById('summary-content').innerHTML =
    meeting.summary || '<em>No summary available.</em>';

  // meta
  document.getElementById('meta-date').textContent = meeting.display_date;
  document.getElementById('meta-type').textContent = meeting.meeting_type || 'Meeting';
  document.getElementById('meta-year').textContent = meeting.year;

  // main docs
  const main = [];
  if(meeting.agenda_url) main.push(buildDoc('Agenda', meeting.agenda_url));
  if(meeting.minutes_url) main.push(buildDoc('Minutes', meeting.minutes_url));
  if(meeting.package_url) main.push(buildDoc('Agenda Package', meeting.package_url));
  if(meeting.video_url) main.push(buildDoc('Video Recording', meeting.video_url));

  document.getElementById('main-docs').innerHTML = main.join('');

  // extra docs
  const extra = meeting.extra_docs || [];

  if(extra.length){
    document.getElementById('extra-docs-wrap').innerHTML = `
      <div class="docs-section">
        <div class="docs-section-title">Additional Files</div>
        <div class="docs-stack">
          ${extra.map(d => buildDoc(d.label, d.url)).join('')}
        </div>
      </div>
    `;
  }
}

init();
</script>

</body>
</html>
