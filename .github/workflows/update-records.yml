name: Update records

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: write

jobs:
  update-records:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pdfminer.six

      - name: Run record updaters
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/update_meetings.py
          python scripts/update_bylaws.py
          python scripts/update_boards.py
          python scripts/validate_data.py

      - name: Show canonical data counts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          base = Path("data/canonical")

          meetings = json.loads((base / "meetings.json").read_text(encoding="utf-8"))
          bylaws = json.loads((base / "bylaws.json").read_text(encoding="utf-8"))
          resolutions = json.loads((base / "resolutions.json").read_text(encoding="utf-8"))
          boards = json.loads((base / "boards.json").read_text(encoding="utf-8"))

          print("meetings:", len(meetings.get("meetings", [])))
          print("bylaws:", len(bylaws.get("bylaws", [])))
          print("resolutions:", len(resolutions.get("resolutions", [])))
          print("boards:", sum(len(b.get("meetings", [])) for b in boards.get("boards", [])))
          PY
      - name: Commit canonical data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/canonical data/runtime
          git diff --cached --quiet || git commit -m "Auto-update canonical records"
          git push
