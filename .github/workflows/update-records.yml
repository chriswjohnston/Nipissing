name: Update records

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: write

jobs:
  update-records:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pdfminer.six

      - name: Run record updaters
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/update_meetings.py
          python scripts/update_bylaws.py
          python scripts/update_boards.py
          python scripts/validate_data.py

      - name: Commit canonical data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/canonical data/runtime
          git diff --cached --quiet || git commit -m "Auto-update canonical records"
          git push
