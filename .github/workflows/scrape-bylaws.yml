name: Scrape By-Laws & Resolutions

on:
  schedule:
    - cron: '0 9 1,15 * *'   # 1st and 15th at 9am UTC (offset from council)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 pymupdf anthropic pytesseract Pillow

      - name: Run bylaw scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scrape.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/bylaws-data.json docs/resolutions-data.json || true
          git diff --staged --quiet && echo "No changes" || (
            COUNT=$(python -c "import json; d=json.load(open('docs/bylaws-data.json')); print(len(d['bylaws']))")
            git commit -m "Bylaw update — ${COUNT} by-laws [automated]"
            git pull --rebase --autostash origin main
            git push origin main
          )
