name: Scrape Council Meetings

on:
  schedule:
    - cron: '0 8 1,15 * *'   # 1st and 15th at 8am UTC (3am EST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pdfminer.six

      - name: Run council scraper
        env:
          BRANCH: public
        run: python scraper.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state.json html_page_cache.json summaries.json || true
          git diff --staged --quiet && echo "No changes" || (
            COUNT=$(python -c "import json; d=json.load(open('docs/council-data.json')); print(len(d['meetings']))")
            git commit -m "Council update — ${COUNT} meetings [automated]"
            git pull --rebase --autostash origin main
            git push origin main
          )
