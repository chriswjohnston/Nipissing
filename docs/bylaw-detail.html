<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>By-Law — Nipissing Township Public Records</title>
<link rel="stylesheet" href="shared.css">

<style>
.detail-wrap{
  display:grid;
  grid-template-columns:minmax(0,1fr) 320px;
  gap:2rem;
  max-width:1240px;
  margin:2rem auto;
  padding:0 2rem;
}

@media(max-width:900px){
  .detail-wrap{grid-template-columns:1fr}
}

.detail-card{
  background:var(--white);
  border:1px solid var(--rule);
  border-radius:14px;
  padding:1.5rem;
}

.detail-title{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:.9rem;
}

.bylaw-header{
  display:flex;
  align-items:flex-start;
  gap:1rem;
}

.bylaw-icon{
  width:48px;
  height:48px;
  border-radius:10px;
  background:var(--blue-lt);
  color:var(--blue);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.bylaw-icon svg{
  width:22px;
  height:22px;
}

.bylaw-meta{
  min-width:0;
}

.bylaw-number{
  font-size:.74rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--blue);
  margin-bottom:.35rem;
}

.bylaw-name{
  font-family:var(--font-display, Georgia, serif);
  font-size:1.65rem;
  line-height:1.25;
  color:var(--ink);
  margin:0 0 .55rem 0;
}

.bylaw-subtitle{
  color:var(--ink-3);
  font-size:.98rem;
  line-height:1.6;
  margin-bottom:.9rem;
}

.meta-pills{
  display:flex;
  flex-wrap:wrap;
  gap:.45rem;
}

.meta-pill{
  display:inline-flex;
  align-items:center;
  padding:.25rem .55rem;
  border-radius:8px;
  border:1px solid var(--rule);
  background:var(--page);
  font-size:.78rem;
  color:var(--ink-3);
}

.status-pill{
  font-weight:600;
}

.status-approved{
  background:#e8f5ea;
  border-color:#cde7d3;
  color:#22743d;
}
.bylaw-header {
  background: var(--forest);
  color: white;
  padding: 32px 0 40px;
}

.back-link {
  display: inline-block;
  margin-bottom: 12px;
  color: rgba(255,255,255,0.85);
  text-decoration: none;
  font-size: 14px;
}

.back-link:hover {
  text-decoration: underline;
}

.header-meta {
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.8;
  margin-bottom: 8px;
}

.header-title {
  font-size: 36px;
  margin: 0 0 8px;
}

.header-subtitle {
  font-size: 18px;
  opacity: 0.9;
  margin-bottom: 16px;
}

.header-actions .btn-outline {
  margin-right: 10px;
}
.status-pending{
  background:#fff6e2;
  border-color:#ecdca9;
  color:#9a6d00;
}

.status-defeated{
  background:#fdeaea;
  border-color:#efc8c8;
  color:#b42318;
}

.content-block{
  margin-top:1.25rem;
}

.content-block h3{
  font-size:.82rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin:0 0 .65rem 0;
}

.content-block p{
  margin:.55rem 0;
  line-height:1.7;
  color:var(--ink);
}

.side-card{
  background:var(--white);
  border:1px solid var(--rule);
  border-radius:14px;
  padding:1.2rem;
  margin-bottom:1rem;
}

.side-title{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:.9rem;
}

.meta-row{
  margin-bottom:.9rem;
  padding-bottom:.9rem;
  border-bottom:1px solid var(--rule);
}

.meta-row:last-child{
  margin-bottom:0;
  padding-bottom:0;
  border-bottom:none;
}

.meta-label{
  font-size:.68rem;
  text-transform:uppercase;
  color:var(--ink-4);
  letter-spacing:.05em;
  margin-bottom:.25rem;
}

.meta-value{
  font-size:.95rem;
  font-weight:600;
  color:var(--ink);
}

.docs-stack{
  display:flex;
  flex-direction:column;
  gap:.5rem;
}

.doc-link{
  display:flex;
  align-items:center;
  gap:.6rem;
  padding:.7rem .8rem;
  border:1px solid var(--rule);
  border-radius:10px;
  text-decoration:none;
  color:var(--ink);
  font-size:.88rem;
  font-weight:500;
  background:var(--white);
  transition:.15s;
}

.doc-link:hover{
  background:var(--blue-lt);
  border-color:var(--blue);
}

.doc-link svg{
  width:16px;
  height:16px;
  flex-shrink:0;
}

.empty-note{
  color:var(--ink-4);
  font-size:.9rem;
  font-style:italic;
}
</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">
      <div class="nav-brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="nav-brand-text">Nipissing Township <span>Public Records</span></div>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="bylaws.html" class="active">By-Laws &amp; Resolutions</a></li>
      <li><a href="council.html">Meetings</a></li>
    </ul>
  </div>
</nav>
<section class="bylaw-page-header">
  <div class="header-inner">

    <a href="bylaws.html" class="back-link">← Back to By-Laws</a>

    <div class="header-meta">
      <span class="header-type">BY-LAW</span>
      <span id="bylaw-header-status" class="header-status"></span>
    </div>

    <h1 class="header-title" id="bylaw-header-number"></h1>

    <div class="header-subtitle" id="bylaw-header-title"></div>

    <div class="header-actions" id="bylaw-header-actions"></div>

  </div>
</section>
<main class="detail-wrap">

  <div>
    <div class="detail-card">
      <div class="detail-title">By-Law</div>

      <div class="bylaw-header">
        <div class="bylaw-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>

        <div class="bylaw-meta">
          <div class="bylaw-number" id="bylaw-number"></div>
          <h1 class="bylaw-name" id="bylaw-title"></h1>
          <div class="bylaw-subtitle" id="bylaw-subtitle"></div>

          <div class="meta-pills" id="bylaw-pills"></div>
        </div>
      </div>

      <div class="content-block" id="summary-block" style="display:none">
        <h3>Summary</h3>
        <p id="bylaw-summary"></p>
      </div>
    </div>
  </div>

  <div>
    <div class="side-card">
      <div class="side-title">Details</div>

      <div class="meta-row">
        <div class="meta-label">Number</div>
        <div class="meta-value" id="meta-number"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Year</div>
        <div class="meta-value" id="meta-year"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Date Passed</div>
        <div class="meta-value" id="meta-date-passed"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Status</div>
        <div class="meta-value" id="meta-status"></div>
      </div>
    </div>

    <div class="side-card">
      <div class="side-title">Documents &amp; Links</div>
      <div class="docs-stack" id="doc-links"></div>
    </div>
  </div>

</main>

<script src="shared.js"></script>
<script>
function getParam(name){
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

function esc(str){
  return (str || '').replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}

function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(`${iso}T00:00:00`);
  if(Number.isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-CA', {month:'short', day:'numeric', year:'numeric'});
}

function iconDoc(){
  return `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
  `;
}

function iconCalendar(){
  return `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
      <line x1="16" x2="16" y1="2" y2="6"/>
      <line x1="8" x2="8" y1="2" y2="6"/>
      <line x1="3" x2="21" y1="10" y2="10"/>
    </svg>
  `;
}

function docLink(label, href, icon = 'doc'){
  const glyph = icon === 'calendar' ? iconCalendar() : iconDoc();
  return `<a href="${esc(href)}" target="${icon === 'calendar' ? '_self' : '_blank'}" rel="noopener" class="doc-link">${glyph}<span>${esc(label)}</span></a>`;
}

async function init(){
  await loadAllData();

  const id = getParam('id') || getParam('number');
  const bylaw = BYLAWS.find(b => String(b.number) === String(id));

  if(!bylaw){
    document.body.innerHTML = '<p style="padding:2rem">By-law not found</p>';
    return;
  }

  document.title = `By-Law ${bylaw.number} — Nipissing Township Public Records`;

  document.getElementById('bylaw-number').textContent = `By-Law ${bylaw.number}`;
  document.getElementById('bylaw-title').textContent = bylaw.title || `By-Law ${bylaw.number}`;
  document.getElementById('bylaw-subtitle').textContent = bylaw.title || '';

  document.getElementById('meta-number').textContent = bylaw.number || '—';
  document.getElementById('meta-year').textContent = bylaw.year || '—';
  document.getElementById('meta-date-passed').textContent = fmtDate(bylaw.date_passed);
  document.getElementById('meta-status').textContent = bylaw.status || '—';

  const statusClass =
    bylaw.status === 'approved' ? 'status-approved' :
    bylaw.status === 'defeated' ? 'status-defeated' :
    'status-pending';

  const pills = [];
  pills.push(`<span class="meta-pill status-pill ${statusClass}">${esc(bylaw.status || 'unknown')}</span>`);
  if(bylaw.year) pills.push(`<span class="meta-pill">${esc(String(bylaw.year))}</span>`);
  document.getElementById('bylaw-pills').innerHTML = pills.join('');

  if(bylaw.summary){
    document.getElementById('summary-block').style.display = '';
    document.getElementById('bylaw-summary').textContent = bylaw.summary;
  }

  const links = [];
  if(bylaw.pdf_url) links.push(docLink('By-Law PDF', bylaw.pdf_url));
  if(bylaw.page_url) links.push(docLink('Township By-Law Page', bylaw.page_url));
  if(bylaw.minutes_url) links.push(docLink('Minutes', bylaw.minutes_url));
  if(bylaw.agenda_package_url) links.push(docLink('Agenda Package', bylaw.agenda_package_url));
  if(bylaw.meeting_date){
    links.push(docLink(
      'Related Meeting',
      `meeting-detail.html?date=${encodeURIComponent(bylaw.meeting_date)}&body=council`,
      'calendar'
    ));
  }

  document.getElementById('doc-links').innerHTML =
    links.length ? links.join('') : '<p class="empty-note">No related documents available.</p>';
}

init();
</script>
</body>
</html>
