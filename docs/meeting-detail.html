<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meeting — Nipissing Township Public Records</title>

<link rel="stylesheet" href="shared.css">

<style>
.meeting-hero{
  background:var(--blue);
  color:#fff;
  padding:2rem 0 2.2rem;
  margin-bottom:1.5rem;
}

.hero-inner{
  max-width:1240px;
  margin:0 auto;
  padding:0 2rem;
}

.back-link{
  display:inline-block;
  margin-bottom:.8rem;
  color:#dbe7f3;
  text-decoration:none;
  font-size:.9rem;
}

.back-link:hover{
  text-decoration:underline;
}

.hero-kicker{
  font-size:.7rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.75;
  margin-bottom:.25rem;
}

.hero-title{
  font-size:2rem;
  font-weight:600;
  line-height:1.2;
  margin:0;
  color:#fff;
}

.hero-actions{
  display:flex;
  flex-wrap:wrap;
  gap:.5rem;
  margin-top:1rem;
}

.hero-btn{
  display:inline-block;
  padding:.45rem .7rem;
  border:1px solid rgba(255,255,255,.35);
  border-radius:8px;
  font-size:.8rem;
  text-decoration:none;
  color:#fff;
  background:rgba(255,255,255,.08);
}

.hero-btn:hover{
  background:rgba(255,255,255,.18);
}

.detail-wrap{
  display:grid;
  grid-template-columns:minmax(0,1fr) 320px;
  gap:2rem;
  max-width:1240px;
  margin:2rem auto;
  padding:0 2rem;
}

@media(max-width:900px){
  .detail-wrap{grid-template-columns:1fr}
}

.summary-card{
  background:var(--white);
  border:1px solid var(--rule);
  border-radius:14px;
  padding:1.5rem;
}

.summary-title{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:.9rem;
}

.summary-body{
  font-size:.95rem;
  line-height:1.75;
  color:var(--ink);
}

.summary-body h1,
.summary-body h2,
.summary-body h3,
.summary-body h4{
  color:var(--ink);
  margin:1rem 0 .6rem;
  line-height:1.25;
}

.summary-body h1{font-size:1.65rem}
.summary-body h2{font-size:1.35rem}
.summary-body h3{font-size:1.05rem}
.summary-body h4{font-size:.95rem}

.summary-body p{
  margin:.65rem 0;
}

.summary-body ul{
  margin:.65rem 0 .9rem 1.25rem;
}

.summary-body li{
  margin:.3rem 0;
}

.summary-body hr{
  border:none;
  border-top:1px solid var(--rule);
  margin:1rem 0;
}

.side-card{
  background:var(--white);
  border:1px solid var(--rule);
  border-radius:14px;
  padding:1.2rem;
  margin-bottom:1rem;
}

.side-title{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:.9rem;
}

.meta-row{
  margin-bottom:.9rem;
  padding-bottom:.9rem;
  border-bottom:1px solid var(--rule);
}

.meta-row:last-child{
  margin-bottom:0;
  padding-bottom:0;
  border-bottom:none;
}

.meta-label{
  font-size:.68rem;
  text-transform:uppercase;
  color:var(--ink-4);
  letter-spacing:.05em;
  margin-bottom:.25rem;
}

.meta-value{
  font-size:.95rem;
  font-weight:600;
  color:var(--ink);
}

.docs-section{
  margin-top:1rem;
  padding-top:1rem;
  border-top:1px solid var(--rule);
}

.docs-section-title{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:.6rem;
}

.docs-stack{
  display:flex;
  flex-direction:column;
  gap:.5rem;
}

.doc-link{
  display:flex;
  align-items:center;
  gap:.6rem;
  padding:.7rem .8rem;
  border:1px solid var(--rule);
  border-radius:10px;
  text-decoration:none;
  color:var(--ink);
  font-size:.88rem;
  font-weight:500;
  background:var(--white);
  transition:.15s;
}

.doc-link:hover{
  background:var(--blue-lt);
  border-color:var(--blue);
}

.doc-link svg{
  width:16px;
  height:16px;
  flex-shrink:0;
}

.empty-note{
  color:var(--ink-4);
  font-size:.9rem;
  font-style:italic;
}
</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">
      <div class="nav-brand-text">Nipissing Township <span>Public Records</span></div>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="bylaws.html">By-Laws &amp; Resolutions</a></li>
      <li><a href="council.html">Meetings</a></li>
    </ul>
  </div>
</nav>

<section class="meeting-hero">
  <div class="hero-inner">
    <a href="council.html" class="back-link">← Back to Meetings</a>
    <div class="hero-kicker" id="hero-kicker"></div>
    <h1 class="hero-title" id="hero-title"></h1>
    <div class="hero-actions" id="hero-actions"></div>
  </div>
</section>

<main class="detail-wrap">

  <div>
    <div class="summary-card">
      <div class="summary-title">Summary</div>
      <div class="summary-body" id="summary-content"></div>
    </div>
  </div>

  <div>
    <div class="side-card">
      <div class="side-title">Meeting Details</div>

      <div class="meta-row">
        <div class="meta-label">Date</div>
        <div class="meta-value" id="meta-date"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Type</div>
        <div class="meta-value" id="meta-type"></div>
      </div>

      <div class="meta-row">
        <div class="meta-label">Year</div>
        <div class="meta-value" id="meta-year"></div>
      </div>
    </div>

    <div class="side-card">
      <div class="side-title">Documents &amp; Links</div>
      <div class="docs-stack" id="main-docs"></div>
      <div id="extra-docs-wrap"></div>
    </div>
  </div>

</main>

<script src="shared.js"></script>

<script>
function getParam(name){
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

function esc(str){
  return (str || '').replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}

function icon(){
  return `
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
  </svg>`;
}

function buildDoc(label, url){
  return `<a href="${esc(url)}" target="_blank" rel="noopener" class="doc-link">${icon()}<span>${esc(label)}</span></a>`;
}

function buildHeroBtn(label, url){
  return `<a href="${esc(url)}" target="_blank" rel="noopener" class="hero-btn">${esc(label)}</a>`;
}

function inlineMarkdown(text){
  let out = esc(text);
  out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/\*(.+?)\*/g, '<em>$1</em>');
  return out;
}

function renderSummaryMarkdown(md){
  if(!md || !String(md).trim()){
    return '<p class="empty-note">No summary available.</p>';
  }

  const lines = String(md).replace(/\r\n/g, '\n').split('\n');
  let html = '';
  let inList = false;

  function closeList(){
    if(inList){
      html += '</ul>';
      inList = false;
    }
  }

  for(let raw of lines){
    const line = raw.trim();

    if(!line){
      closeList();
      continue;
    }

    if(line === '---' || line === '***' || line === '___'){
      closeList();
      html += '<hr>';
      continue;
    }

    if(line.startsWith('#### ')){
      closeList();
      html += `<h4>${inlineMarkdown(line.slice(5))}</h4>`;
      continue;
    }

    if(line.startsWith('### ')){
      closeList();
      html += `<h3>${inlineMarkdown(line.slice(4))}</h3>`;
      continue;
    }

    if(line.startsWith('## ')){
      closeList();
      html += `<h2>${inlineMarkdown(line.slice(3))}</h2>`;
      continue;
    }

    if(line.startsWith('# ')){
      closeList();
      html += `<h1>${inlineMarkdown(line.slice(2))}</h1>`;
      continue;
    }

    if(/^[-*•]\s+/.test(line)){
      if(!inList){
        html += '<ul>';
        inList = true;
      }
      html += `<li>${inlineMarkdown(line.replace(/^[-*•]\s+/, ''))}</li>`;
      continue;
    }

    closeList();
    html += `<p>${inlineMarkdown(line)}</p>`;
  }

  closeList();
  return html;
}

async function init(){
  await loadAllData();

  const date = getParam('date');
  const meeting = ALL_MEETINGS.find(m => m.date === date);

  if(!meeting){
    document.body.innerHTML = '<p style="padding:2rem">Meeting not found</p>';
    return;
  }

  const bodyLabel = meeting.body || 'Council';
  const typeLabel = meeting.meeting_type || 'Meeting';

  document.getElementById('hero-kicker').textContent =
    `${typeLabel.toUpperCase()} · ${bodyLabel.toUpperCase()}`;

  document.getElementById('hero-title').textContent =
    meeting.display_date || meeting.date;

  const actions = [];
  if(meeting.agenda_url) actions.push(buildHeroBtn('Agenda', meeting.agenda_url));
  if(meeting.minutes_url) actions.push(buildHeroBtn('Minutes', meeting.minutes_url));
  if(meeting.package_url) actions.push(buildHeroBtn('Agenda Package', meeting.package_url));
  if(meeting.video_url) actions.push(buildHeroBtn('Video Recording', meeting.video_url));
  document.getElementById('hero-actions').innerHTML = actions.join('');

  document.getElementById('summary-content').innerHTML = renderSummaryMarkdown(meeting.summary);
  document.getElementById('meta-date').textContent = meeting.display_date || '';
  document.getElementById('meta-type').textContent = meeting.meeting_type || 'Meeting';
  document.getElementById('meta-year').textContent = meeting.year || '';

  const main = [];
  if(meeting.agenda_url) main.push(buildDoc('Agenda', meeting.agenda_url));
  if(meeting.minutes_url) main.push(buildDoc('Minutes', meeting.minutes_url));
  if(meeting.package_url) main.push(buildDoc('Agenda Package', meeting.package_url));
  if(meeting.video_url) main.push(buildDoc('Video Recording', meeting.video_url));

  document.getElementById('main-docs').innerHTML =
    main.length ? main.join('') : '<p class="empty-note">No primary documents available.</p>';

  const extra = meeting.extra_docs || [];
  if(extra.length){
    document.getElementById('extra-docs-wrap').innerHTML = `
      <div class="docs-section">
        <div class="docs-section-title">Additional Files</div>
        <div class="docs-stack">
          ${extra.map(d => buildDoc(d.label, d.url)).join('')}
        </div>
      </div>
    `;
  }
}

init();
</script>

</body>
</html>
